name = "clerkai-medical-worker"
main = "worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

# ── KV NAMESPACES ──────────────────────────────────────────────
# Create these with: wrangler kv:namespace create "CASES_KV" etc.
# Then paste the IDs below.
[[kv_namespaces]]
binding = "CASES_KV"
id = "REPLACE_WITH_YOUR_CASES_KV_ID"
preview_id = "REPLACE_WITH_YOUR_CASES_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "SCORES_KV"
id = "REPLACE_WITH_YOUR_SCORES_KV_ID"
preview_id = "REPLACE_WITH_YOUR_SCORES_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "KNOWLEDGE_KV"
id = "REPLACE_WITH_YOUR_KNOWLEDGE_KV_ID"
preview_id = "REPLACE_WITH_YOUR_KNOWLEDGE_KV_PREVIEW_ID"

# ── ENVIRONMENT VARIABLES ──────────────────────────────────────
# Set secrets via: wrangler secret put ADMIN_SECRET
[vars]
# ADMIN_SECRET is set as a secret — do not hardcode here

# ── ROUTES (optional — if using a custom domain) ───────────────
# [[routes]]
# pattern = "api.clerkai.yourdomain.com/*"
# zone_name = "yourdomain.com"
