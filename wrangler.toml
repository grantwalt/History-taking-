name = "clerkai-medical-worker"
main = "worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

# ── KV NAMESPACES ──────────────────────────────────────────────
# Create these KV namespaces in your Cloudflare Dashboard:
# wrangler kv:namespace create "CLERK_KV"
# Then copy the ID and preview_id below
[[kv_namespaces]]
binding = "CLERK_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_ID"

# ── ENVIRONMENT VARIABLES & SECRETS ─────────────────────────────
# Set ADMIN_SECRET via: wrangler secret put ADMIN_SECRET
[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

# ── ROUTES (optional — if using a custom domain) ────────────────
# Uncomment and update if you have a custom domain
# [[routes]]
# pattern = "api.clerkai.yourdomain.com/*"
# zone_name = "yourdomain.com"
